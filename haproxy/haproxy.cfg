global
  log stdout format raw local0

defaults
  log global
  mode http
  option httplog
  timeout connect 5s
  timeout client 30s
  timeout server 30s

frontend fe_http
  bind *:80
  acl is_api path_beg /api
  use_backend be_api if is_api
  default_backend be_frontend

backend be_api
  server backend backend:3000 check

backend be_frontend
  server frontend frontend:4173 check
